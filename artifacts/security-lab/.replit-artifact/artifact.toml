kind = "web"
previewPath = "/"
title = "Lab Seguridad - Gestión de Secretos"
version = "1.0.0"
id = "artifacts/security-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19272

[services.development]
run = "pnpm --filter @workspace/security-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/security-lab", "run", "build" ]
publicDir = "artifacts/security-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19272"
BASE_PATH = "/"
